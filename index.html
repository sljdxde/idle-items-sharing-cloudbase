<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同小区闲置好物互助</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">邻里闲置分享</h1>
      <div class="nav-links">
        <a href="index.html" class="active">首页</a>
        <a href="publish.html" class="btn-publish">发布闲置</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <header class="page-header">
      <h2>最新发布</h2>
      <p>发现小区邻居的好闲置，让物品继续发光发热</p>
    </header>

    <div id="loading" class="loading-spinner">
      <div class="spinner"></div>
      <p>正在加载物品列表...</p>
    </div>

    <div id="item-list" class="item-grid" style="display: none;">
      <!-- 卡片由 JS 动态渲染 -->
    </div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <p>暂无闲置物品，去<a href="publish.html">发布第一件</a>吧！</p>
    </div>
  </main>

  <!-- 管理弹窗 -->
  <div id="manageModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h3>物品管理</h3>
      <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 1rem;">需验证本物品的 4 位管理密码 (PIN) 才能继续操作。</p>
      <input type="text" id="managePinInput" placeholder="输入 4 位 PIN (自动记忆)" maxlength="4" pattern="\d{4}">

      <div class="modal-actions">
        <button id="btnSetLent" class="btn-warning" onclick="executeManageAction('lent')">标记为借出</button>
        <button id="btnSetAvailable" class="btn-success" onclick="executeManageAction('available')"
          style="display:none;">恢复闲置</button>
        <button class="btn-danger" onclick="executeManageAction('delete')">永久下架</button>
        <button class="btn-cancel" onclick="closeManageModal()">取消</button>
      </div>
    </div>
  </div>

  <script src="js/github.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      initApp('index');
    });
  </script>
</body>

</html>
