<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布闲置 - 闲置物品分享平台</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.bdstatic.com/npm/leancloud-storage@4.15.2/dist/av-min.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">闲置分享</h1>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="publish.html" class="btn-publish active">发布闲置</a>
            </div>
        </div>
    </nav>

    <main class="container form-container">
        <div class="card form-card">
            <h2>发布闲置物品</h2>
            <form id="publish-form">
                <div class="form-group">
                    <label for="itemName">物品名称 <span class="required">*</span></label>
                    <input type="text" id="itemName" placeholder="例如：九成新机械键盘" required maxlength="50">
                </div>

                <div class="form-group">
                    <label for="itemDesc">详细描述 <span class="required">*</span></label>
                    <textarea id="itemDesc" rows="4" placeholder="描述一下物品的新旧程度、购买时间、转手原因等" required></textarea>
                </div>

                <div class="form-group">
                    <label for="itemContact">联系方式 <span class="required">*</span></label>
                    <input type="text" id="itemContact" placeholder="例如：微信 xxx 或 手机号" required>
                </div>

                <div class="form-group">
                    <label for="itemImage">上传图片 <span class="required">*</span></label>
                    <input type="file" id="itemImage" accept="image/jpeg, image/png, image/webp" required>
                    <div class="file-help">仅支持 jpg/png 格式，不超过 5MB</div>
                    <div id="imagePreview" class="image-preview" style="display:none;">
                        <img id="previewImg" src="" alt="预览图">
                    </div>
                </div>

                <div id="uploadProgress" class="progress-container" style="display:none;">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                    </div>
                    <p id="progressText" class="progress-text">上传中: 0%</p>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary btn-block">发布物品</button>
            </form>
        </div>
    </main>

    <script src="js/leancloud.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            initApp('publish');
        });
    </script>
</body>

</html>
